<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mon Coach">
<title>Mon Coach Fitness</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
:root{
  --green:#22c55e;--green-dark:#16a34a;--green-bg:#dcfce7;--green-text:#15803d;
  --blue:#3b82f6;--blue-bg:#dbeafe;--blue-text:#1d4ed8;
  --amber-bg:#fef3c7;--amber-text:#92400e;
  --red:#ef4444;--red-bg:#fee2e2;--red-text:#991b1b;
  --purple-bg:#ede9fe;--purple-text:#5b21b6;
  --orange-bg:#fff7ed;--orange-text:#c2410c;
  --bg:#f8fafc;--card:#fff;--border:#e2e8f0;
  --text:#0f172a;--muted:#64748b;--light:#f1f5f9;
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bottom:env(safe-area-inset-bottom,20px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text)}
.app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 6px;flex-shrink:0}
.topbar-left .date{font-size:12px;color:var(--muted)}
.topbar-left .title{font-size:18px;font-weight:700}
.flame-pill{display:flex;align-items:center;gap:4px;background:#fff7ed;border:1px solid #fed7aa;border-radius:20px;padding:5px 12px;font-size:15px;font-weight:700;color:#c2410c}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 14px 16px}
.bottom-nav{display:flex;background:var(--card);border-top:1px solid var(--border);flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;border:none;background:none;cursor:pointer;color:var(--muted);font-size:9px;font-family:inherit;transition:color .15s}
.nav-btn.active{color:var(--green-dark)}
.nav-btn svg{width:20px;height:20px}
.tab{display:none}.tab.active{display:block}
.card{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:10px}
.card-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.card-head-title{font-size:14px;font-weight:600}
.card-body{padding:12px 14px}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.b-run{background:var(--green-bg);color:var(--green-text)}
.b-gym{background:var(--blue-bg);color:var(--blue-text)}
.b-rest{background:var(--light);color:var(--muted)}
.goal-card{background:linear-gradient(135deg,#0f172a,#1e3a5f);border-radius:18px;padding:18px;margin-bottom:10px;color:#fff}
.goal-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px}
.goal-kg{font-size:38px;font-weight:700;line-height:1}
.goal-kg span{font-size:16px;opacity:.6}
.goal-lbl{font-size:11px;opacity:.6;margin-top:2px}
.goal-right{text-align:right}
.goal-target{font-size:20px;font-weight:700;color:var(--green)}
.progress-bg{height:5px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width .6s}
.eta-row{display:flex;justify-content:space-between;align-items:center}
.eta-main{font-size:12px;font-weight:600;color:var(--green)}
.eta-pct{font-size:11px;opacity:.5}
.phase-pill{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;cursor:pointer}
.phase-dot{width:9px;height:9px;border-radius:50%;background:var(--green);flex-shrink:0}
.phase-name{font-size:13px;font-weight:600}
.phase-sub{font-size:11px;color:var(--muted);margin-top:1px}
.chevron{margin-left:auto;color:var(--muted);font-size:16px}
/* GYM SECTIONS */
.gym-section{margin-bottom:12px}
.gym-section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.gym-section-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.s-warmup{background:#fef3c7;color:#92400e}
.s-muscle{background:#dbeafe;color:#1d4ed8}
.s-cardio{background:#dcfce7;color:#15803d}
.exercise-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.exercise-row:last-child{border-bottom:none}
.ex-num{width:22px;height:22px;border-radius:50%;background:var(--blue-bg);color:var(--blue-text);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.ex-name{font-size:13px;font-weight:600;color:var(--text)}
.ex-detail{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
.ex-sets{font-size:11px;font-weight:600;background:var(--light);color:var(--muted);padding:2px 7px;border-radius:6px;margin-top:4px;display:inline-block}
.tapis-card{background:linear-gradient(135deg,#1e3a5f,#0f172a);border-radius:14px;padding:14px;margin-top:4px;color:#fff}
.tapis-title{font-size:13px;font-weight:700;color:var(--green);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.tapis-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.tapis-stat{text-align:center}
.tapis-val{font-size:18px;font-weight:700}
.tapis-lbl{font-size:10px;opacity:.6;margin-top:2px}
.tapis-note{font-size:11px;opacity:.6;margin-top:10px;text-align:center}
/* RUN */
.prog-item{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border)}
.prog-item:last-child{border-bottom:none;padding-bottom:0}
.prog-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ico-run{background:var(--green-bg)}.ico-gym{background:var(--blue-bg)}.ico-rest{background:var(--light)}
.prog-lbl{font-size:13px;font-weight:500}
.prog-det{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
.done-btn{display:block;width:100%;padding:13px;font-size:14px;font-weight:600;font-family:inherit;border:none;cursor:pointer;transition:all .15s;border-top:1px solid var(--border)}
.done-btn.go{background:var(--green);color:#fff}
.done-btn.go:active{background:var(--green-dark);transform:scale(.98)}
.done-btn.did{background:var(--light);color:var(--muted);cursor:default}
.meal-row{padding:9px 0;border-bottom:1px solid var(--border)}
.meal-row:last-child{border-bottom:none}
.meal-row.creatine-row{background:var(--purple-bg);margin:0 -14px;padding:9px 14px}
.meal-t{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.meal-row.creatine-row .meal-t{color:var(--purple-text)}
.meal-n{font-size:13px;margin-top:2px;line-height:1.4}
.meal-k{font-size:11px;color:var(--muted);margin-top:3px}
.macros{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.macro-pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--light);color:var(--muted)}
.macro-pill.prot{background:#dbeafe;color:#1d4ed8}
.macro-pill.gluc{background:#dcfce7;color:#15803d}
.macro-pill.lip{background:#fef3c7;color:#92400e}
.stitle{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 7px}
.reminder{background:var(--amber-bg);border-radius:12px;padding:11px 13px;margin-bottom:10px;display:flex;align-items:center;gap:9px;font-size:13px;color:var(--amber-text);font-weight:500}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.day-cell{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.day-lbl{font-size:9px;color:var(--muted)}
.day-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;border:1.5px solid var(--border);background:var(--light);transition:transform .1s}
.day-dot:active{transform:scale(.9)}
.dd-run{background:var(--green-bg);border-color:var(--green)}
.dd-gym{background:var(--blue-bg);border-color:#93c5fd}
.dd-rest{background:var(--light)}
.dd-today{border:2.5px solid var(--green)}
.dd-future{opacity:.3}
.wplan-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer}
.wplan-row:last-child{border-bottom:none}
.wplan-day{width:28px;font-size:11px;color:var(--muted)}
.wplan-arrow{margin-left:auto;color:var(--muted);font-size:14px}
.w-input-row{display:flex;gap:8px;margin-bottom:12px}
.w-input-row input{flex:1;padding:11px 13px;font-size:16px;border:1.5px solid var(--border);border-radius:12px;background:var(--card);color:var(--text);font-family:inherit;-webkit-appearance:none}
.w-input-row input:focus{outline:none;border-color:var(--green)}
.w-input-row button{padding:11px 16px;border:none;border-radius:12px;background:var(--green);color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
.w-hist-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.w-hist-row:last-child{border-bottom:none}
.chart-wrap{width:100%;height:140px;position:relative;margin:4px 0 8px}
canvas#wchart{width:100%!important;height:140px!important}
.phase-block{border:1.5px solid var(--border);border-radius:14px;padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.phase-block.active-ph{border-color:var(--green);background:#f0fdf4}
.phase-block-head{display:flex;align-items:center;gap:10px}
.ph-circle{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0}
.ph-circle.act{border-color:var(--green);background:var(--green);color:#fff}
.ph-title{font-size:13px;font-weight:600;flex:1}
.ph-body{margin-top:10px;display:none;border-top:1px solid var(--border);padding-top:10px}
.ph-body.open{display:block}
.ph-item{display:flex;gap:8px;padding:6px 0;font-size:12px;border-bottom:1px solid var(--border)}
.ph-item:last-child{border-bottom:none}
.ph-item-ico{width:22px;text-align:center;flex-shrink:0}
.shop-day{margin-bottom:14px}
.shop-day-title{font-size:13px;font-weight:600;margin-bottom:7px}
.shop-item-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.shop-item-row:last-child{border-bottom:none}
.shop-check{width:22px;height:22px;border-radius:7px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:13px}
.shop-check.checked{background:var(--green);border-color:var(--green);color:#fff}
.shop-name{font-size:13px;flex:1}
.shop-qty{font-size:11px;color:var(--muted);white-space:nowrap}
.food-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.food-chip{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .15s;font-size:12px}
.food-chip.liked{border-color:var(--green);background:var(--green-bg);color:var(--green-text)}
.food-chip.disliked{border-color:var(--red);background:var(--red-bg);color:var(--red-text)}
.food-chip-ico{font-size:16px;flex-shrink:0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border-radius:22px 22px 0 0;padding:20px 18px;padding-bottom:calc(20px + var(--safe-bottom));width:100%;max-height:90vh;overflow-y:auto;transform:translateY(40px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title-row{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.modal-close{font-size:24px;color:var(--muted);cursor:pointer;padding:0 4px;line-height:1}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.stat-card{background:var(--light);border-radius:12px;padding:10px;text-align:center}
.stat-val{font-size:20px;font-weight:700;color:var(--text)}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.tip-card{background:var(--purple-bg);border-radius:12px;padding:11px 13px;margin-bottom:10px;font-size:12px;color:var(--purple-text);line-height:1.5}
.tip-card strong{font-weight:600}
.week-meals-nav{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.week-meals-nav::-webkit-scrollbar{display:none}
.wmn-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:inherit}
.wmn-btn.active{border-color:var(--green);background:var(--green-bg);color:var(--green-text)}
/* PROTEIN BAR */
.prot-bar-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:10px}
.prot-bar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prot-bar-title{font-size:13px;font-weight:600}
.prot-bar-val{font-size:13px;font-weight:700;color:var(--blue-text)}
.prot-bar-bg{height:8px;background:var(--light);border-radius:4px;overflow:hidden}
.prot-bar-fill{height:100%;background:var(--blue);border-radius:4px;transition:width .4s}
/* HYDRATION */
.hydra-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:10px}
.hydra-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hydra-title{font-size:13px;font-weight:600}
.hydra-count{font-size:13px;font-weight:700;color:var(--blue-text)}
.hydra-row{display:flex;gap:6px;flex-wrap:wrap}
.water-btn{width:34px;height:34px;border-radius:50%;border:2px solid var(--blue-bg);background:var(--card);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.water-btn.filled{background:var(--blue-bg);border-color:var(--blue)}
/* MEAL CHECK */
.meal-row-inner{display:flex;align-items:flex-start;gap:8px}
.meal-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;flex-shrink:0;margin-top:2px;transition:all .15s}
.meal-check.checked{background:var(--green);border-color:var(--green);color:#fff}
.meal-done .meal-n{text-decoration:line-through;opacity:.5}
/* QUICK MEALS */
.quick-meal{background:#ccfbf1;border-radius:12px;padding:10px 13px;margin-bottom:6px;font-size:12px;color:#0f766e}
.quick-meal strong{font-weight:600;display:block;margin-bottom:3px}
/* TIRED MODE */
.tired-btn{display:block;width:100%;padding:10px;font-size:13px;font-weight:500;font-family:inherit;border:none;background:var(--amber-bg);color:var(--amber-text);cursor:pointer;border-top:1px solid var(--border)}
/* BADGES */
.badges-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.badge-item{border-radius:14px;padding:12px 8px;text-align:center;border:1.5px solid var(--border);background:var(--light)}
.badge-item.unlocked{background:var(--amber-bg);border-color:#fed7aa}
.badge-item.locked .badge-ico{filter:grayscale(1);opacity:.35}
.badge-item.locked .badge-name{color:var(--muted)}
.badge-ico{font-size:26px;margin-bottom:5px}
.badge-name{font-size:11px;font-weight:600;line-height:1.3}
.badge-desc{font-size:10px;color:var(--muted);margin-top:2px}
/* CORPS TAB */
.meas-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.meas-item{background:var(--light);border-radius:12px;padding:10px 12px}
.meas-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.meas-val{font-size:18px;font-weight:700}
.meas-diff{font-size:11px;margin-top:2px}
.meas-input-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.meas-input-wrap{display:flex;flex-direction:column;gap:4px}
.meas-input-wrap label{font-size:11px;color:var(--muted);font-weight:500}
.meas-input-wrap input{padding:9px 12px;font-size:14px;border:1.5px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);font-family:inherit;-webkit-appearance:none;width:100%}
.strength-item{padding:9px 0;border-bottom:1px solid var(--border)}
.strength-item:last-child{border-bottom:none}
.strength-name{font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.strength-best{font-size:16px;font-weight:700;color:var(--blue-text)}
.strength-hist{font-size:11px;color:var(--muted);margin-top:3px}
.strength-add{display:flex;gap:6px;margin-top:6px}
.strength-add input{flex:1;padding:7px 10px;font-size:13px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-family:inherit;-webkit-appearance:none}
.strength-add button{padding:7px 12px;border:none;border-radius:8px;background:var(--blue);color:#fff;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer}
/* TIMER OVERLAY */
.timer-overlay{position:fixed;inset:0;background:rgba(15,23,42,.96);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.timer-overlay.open{opacity:1;pointer-events:all}
.timer-circle{position:relative;width:180px;height:180px;margin-bottom:12px}
.timer-circle svg{transform:rotate(-90deg)}
.timer-display{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:44px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums}
.timer-label{font-size:14px;color:rgba(255,255,255,.6);margin-bottom:6px}
.timer-exercise{font-size:15px;color:rgba(255,255,255,.85);font-weight:500;margin-bottom:28px;text-align:center;padding:0 20px}
.timer-btns{display:flex;gap:10px}
.t-btn-main{padding:13px 28px;border-radius:50px;border:none;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.t-btn-go{background:var(--green);color:#fff}
.t-btn-pause{background:#f97316;color:#fff}
.t-btn-close{padding:13px 22px;border-radius:50px;border:2px solid rgba(255,255,255,.3);background:none;color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
/* EX FOOTER */
.ex-footer{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.ex-timer-btn{font-size:11px;padding:3px 9px;border-radius:8px;border:1.5px solid var(--orange-text);color:var(--orange-text);background:none;cursor:pointer;font-family:inherit;font-weight:600}
.ex-log-btn{font-size:11px;padding:3px 9px;border-radius:8px;border:1.5px solid var(--blue-text);color:var(--blue-text);background:none;cursor:pointer;font-family:inherit;font-weight:600}
.ex-yt-btn{font-size:11px;padding:3px 9px;border-radius:8px;border:1.5px solid var(--muted);color:var(--muted);background:none;cursor:pointer;font-family:inherit}
.ex-logged{font-size:11px;color:var(--green-text);font-weight:600}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="date" id="date-str"></div>
      <div class="title">Mon Coach 💪</div>
    </div>
    <div class="flame-pill" id="flame-pill">🔥 <span id="streak-num">0</span></div>
  </div>
  <div class="scroll-area">
    <div class="tab active" id="tab-today"></div>
    <div class="tab" id="tab-week"></div>
    <div class="tab" id="tab-prog"></div>
    <div class="tab" id="tab-poids"></div>
    <div class="tab" id="tab-courses"></div>
    <div class="tab" id="tab-corps"></div>

// ─── STATE ────────────────────────────────────────────────────
function getState(){
  try{return JSON.parse(localStorage.getItem('coach_v3')||'null')||defState()}
  catch(e){return defState()}
}
function defState(){
  return{streak:0,lastDone:null,weight:93,weights:[],doneDays:{},
    gymSessionA:0,gymSessionB:0,runIdx:0,
    startDate:new Date().toISOString(),foodPrefs:{},shopChecked:{}}
}
function saveState(s){try{localStorage.setItem('coach_v3',JSON.stringify(s))}catch(e){}}

function todayKey(){const d=new Date();return`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`}
function getWeekNum(s){return Math.min(Math.floor((new Date()-new Date(s.startDate))/(7*24*3600*1000)),15)}
function getPhase(w){return w<3?0:w<6?1:w<10?2:3}
function getWeekInPhase(w){
  if(w<3)return w;
  if(w<6)return w-3;
  if(w<10)return Math.min(w-6,2);
  return Math.min(w-10,2);
}

function getGymSession(s, sessionType) {
  const wk = getWeekNum(s);
  const ph = getPhase(wk);
  const wip = getWeekInPhase(wk);
  const phData = GYM_SESSIONS[ph];
  const weekData = phData[Math.min(wip, phData.length-1)];
  if(sessionType === 'A') return weekData[0];
  return weekData[1];
}

function calcETA(state){
  const cur=state.weights.length>0?state.weights[0].val:state.weight;
  const tolose=cur-80;
  if(tolose<=0)return{weeks:0,months:0,dateStr:'Objectif atteint ! 🎉',rate:'0.40'};
  let rate=0.4;
  const wk=getWeekNum(state);
  if(wk>1&&state.weights.length>=2){
    const oldest=state.weights[state.weights.length-1].val;
    const newest=state.weights[0].val;
    const actual=(oldest-newest)/Math.max(1,wk);
    if(actual>0.1)rate=Math.min(actual,0.8);
  }
  const weeks=Math.ceil(tolose/rate);
  const arr=new Date();arr.setDate(arr.getDate()+weeks*7);
  return{weeks,months:Math.round(weeks/4.3),dateStr:MONTHS[arr.getMonth()]+' '+arr.getFullYear(),rate:rate.toFixed(2)};
}

// ─── RENDER MEALS ─────────────────────────────────────────────
function renderMeals(meals) {
  return meals.map(m => {
    const isCreatine = m.t.includes('Créatine');
    // Parse macros from k string like "~430 kcal · 52g P · 38g G · 7g L"
    const kparts = m.k.split('·');
    const kcal = kparts[0] ? kparts[0].trim() : '';
    const prot = kparts[1] ? kparts[1].trim() : '';
    const gluc = kparts[2] ? kparts[2].trim() : '';
    const lip  = kparts[3] ? kparts[3].trim() : '';
    const macrosHTML = !isCreatine && prot ? `
      <div class="macros">
        <span class="macro-pill">${kcal}</span>
        <span class="macro-pill prot">💪 ${prot}</span>
        ${gluc ? `<span class="macro-pill gluc">🌾 ${gluc}</span>` : ''}
        ${lip  ? `<span class="macro-pill lip">🥑 ${lip}</span>`  : ''}
      </div>` : `<div class="meal-k">${m.k}</div>`;
    return `<div class="meal-row${isCreatine?' creatine-row':''}">
      <div class="meal-t">${m.t}</div>
      <div class="meal-n">${m.n}</div>
      ${macrosHTML}
    </div>`;
  }).join('');
}

// ─── TAB: TODAY ───────────────────────────────────────────────
function renderToday(){
  const s=getState();
  const dow=new Date().getDay();
  const sched=SCHED[dow];
  const isDone=!!s.doneDays[todayKey()];
  const wk=getWeekNum(s);
  const ph=getPhase(wk);
  const eta=calcETA(s);
  const cur=s.weights.length>0?s.weights[0].val:s.weight;
  const pct=Math.max(0,Math.min(100,Math.round((93-cur)/(93-80)*100)));

  // Determine if this gym session is A or B
  // Lun=run, Mar=gymA, Mer=run, Jeu=gymB, Ven=run
  const isGymA = (dow === 2); // Tuesday
  const isGymB = (dow === 4); // Thursday

  let sessionHTML = '';
  if(sched.type==='gym'){
    const sessionType = isGymA ? 'A' : 'B';
    const session = getGymSession(s, sessionType);
    sessionHTML = buildGymHTML(session, sessionType);
  } else if(sched.type==='run'){
    const pool=RUN_PROG[ph];

function markDone(){
  const s=getState();
  const key=todayKey();
  if(s.doneDays[key])return;
  s.doneDays[key]=true;
  const dow=new Date().getDay();
  const type=SCHED[dow].type;
  if(type==='run')s.runIdx=(s.runIdx||0)+1;
  else if(type==='gym'){
    if(dow===2)s.gymSessionA=(s.gymSessionA||0)+1;
    else s.gymSessionB=(s.gymSessionB||0)+1;
  }
  const yest=new Date();yest.setDate(yest.getDate()-1);
  const yKey=`${yest.getFullYear()}-${yest.getMonth()}-${yest.getDate()}`;
  if(s.lastDone===yKey||s.lastDone===null)s.streak++;
  else if(s.lastDone!==key)s.streak=1;
  s.lastDone=key;
  saveState(s);
  renderHeader();
  renderToday();
}

// ─── TAB: WEEK ────────────────────────────────────────────────
function renderWeek(){
  const s=getState();
  const today=new Date();
  const mon=new Date(today);
  mon.setDate(today.getDate()-((today.getDay()+6)%7));
  const wk=getWeekNum(s);

  let dots='',plan='';
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const key=`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    const dow=d.getDay();
    const sc=SCHED[dow];
    const isToday=d.toDateString()===today.toDateString();
    const isFuture=d>today;
    const isDone=!!s.doneDays[key];
    let cls='day-dot';
    let icon='';
    if(!isFuture){
      if(isDone){cls+=` dd-${sc.type}`;icon=sc.type==='run'?'🏃':sc.type==='gym'?'💪':'😌';}
      else{cls+=' dd-rest';icon=isToday?'·':'✗';}
    }else{cls+=' dd-future';icon=sc.type==='run'?'🏃':sc.type==='gym'?'💪':'😌';}
    if(isToday)cls+=' dd-today';
    dots+=`<div class="day-cell" onclick="openDayModal(${dow})"><div class="day-lbl">${DAYS_S[dow]}</div><div class="${cls}">${icon}</div></div>`;
  }

  const wlbls=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const wdows=[1,2,3,4,5,6,0];
  plan=wlbls.map((lbl,i)=>{
    const dow=wdows[i];
    const sc=SCHED[dow];
    const isGymA=dow===2;
    const detail=sc.type==='gym'?(isGymA?'Séance A':'Séance B'):sc.label;
    return`<div class="wplan-row" onclick="openDayModal(${dow})">
      <span class="wplan-day">${lbl}</span>
      <span class="badge b-${sc.type}">${sc.type==='run'?'Course':sc.type==='gym'?'Salle':'Repos'}</span>
      <span style="font-size:12px;flex:1;margin-left:6px">${detail}</span>
      <span class="wplan-arrow">›</span>
    </div>`;
  }).join('');

  document.getElementById('tab-week').innerHTML=`
    <div class="stitle">Cette semaine · Semaine ${wk+1}</div>
    <div class="card"><div class="card-body"><div class="week-grid">${dots}</div><div style="font-size:11px;color:var(--muted);text-align:center">Appuie sur un jour pour voir le programme complet</div></div></div>
    <div class="stitle">Planning</div>
    <div class="card"><div class="card-body">${plan}</div></div>
  `;
}

function drawChart(){
  const s=getState();
  const canvas=document.getElementById('wchart');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const w=canvas.offsetWidth||300;
  const h=140;
  canvas.width=w*dpr;canvas.height=h*dpr;
  ctx.scale(dpr,dpr);
  if(s.weights.length<2){
    ctx.fillStyle='#94a3b8';ctx.font='13px DM Sans,sans-serif';ctx.textAlign='center';
    ctx.fillText('Ajoute au moins 2 pesées pour voir la courbe',w/2,h/2);return;
  }
  const pts=s.weights.slice().reverse();
  const vals=pts.map(p=>p.val);
  const mn=Math.min(...vals,80)-1;const mx=Math.max(...vals,93)+1;
  const pad={t:16,r:8,b:28,l:36};
  const cw=w-pad.l-pad.r;const ch=h-pad.t-pad.b;
  const xp=i=>pad.l+i*(cw/Math.max(pts.length-1,1));
  const yp=v=>pad.t+ch-(v-mn)/(mx-mn)*ch;
  ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;
  [80,85,90].forEach(v=>{if(v>=mn&&v<=mx){
    ctx.beginPath();ctx.moveTo(pad.l,yp(v));ctx.lineTo(pad.l+cw,yp(v));ctx.stroke();
    ctx.fillStyle='#94a3b8';ctx.font='10px DM Sans,sans-serif';ctx.textAlign='right';ctx.fillText(v,pad.l-4,yp(v)+3);
  }});
  ctx.strokeStyle='#22c55e';ctx.lineWidth=1;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(pad.l,yp(80));ctx.lineTo(pad.l+cw,yp(80));ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle='#3b82f6';ctx.lineWidth=2.5;
  ctx.beginPath();pts.forEach((p,i)=>{i===0?ctx.moveTo(xp(i),yp(p.val)):ctx.lineTo(xp(i),yp(p.val))});ctx.stroke();
  ctx.fillStyle='rgba(59,130,246,.08)';ctx.beginPath();
  pts.forEach((p,i)=>{i===0?ctx.moveTo(xp(i),yp(p.val)):ctx.lineTo(xp(i),yp(p.val))});
  ctx.lineTo(xp(pts.length-1),h-pad.b);ctx.lineTo(xp(0),h-pad.b);ctx.closePath();ctx.fill();
  pts.forEach((p,i)=>{ctx.fillStyle='#fff';ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.beginPath();ctx.arc(xp(i),yp(p.val),4,0,Math.PI*2);ctx.fill();ctx.stroke();});
  ctx.fillStyle='#94a3b8';ctx.font='9px DM Sans,sans-serif';ctx.textAlign='center';
  const step=Math.max(1,Math.floor(pts.length/4));
  pts.forEach((p,i)=>{if(i%step===0||i===pts.length-1)ctx.fillText(p.date.slice(0,5),xp(i),h-8)});
  ctx.fillStyle='#22c55e';ctx.font='10px DM Sans,sans-serif';ctx.textAlign='right';
  ctx.fillText('objectif 80 kg',w-6,yp(80)-4);
}

  {id:'minus3',ico:'⚖️',name:'-3 kg',desc:'Perdu 3 kg',check:s=>s.weights&&s.weights.length>0&&(93-s.weights[0].val)>=3},
  {id:'minus5',ico:'🏅',name:'-5 kg',desc:'Perdu 5 kg',check:s=>s.weights&&s.weights.length>0&&(93-s.weights[0].val)>=5},
  {id:'minus10',ico:'🏆',name:'-10 kg',desc:'Perdu 10 kg',check:s=>s.weights&&s.weights.length>0&&(93-s.weights[0].val)>=10},
  {id:'streak14',ico:'⚡',name:'2 semaines',desc:'14 jours de série',check:s=>s.streak>=14},
  {id:'streak30',ico:'🌟',name:'1 mois',desc:'30 jours de série',check:s=>s.streak>=30},
  {id:'phase2',ico:'🚀',name:'Phase 2',desc:'Semaine 4 atteinte',check:s=>getWeekNum(s)>=3},
  {id:'phase3',ico:'💥',name:'Phase 3',desc:'Semaine 7 atteinte',check:s=>getWeekNum(s)>=6},
  {id:'phase4',ico:'👑',name:'Phase 4',desc:'Semaine 11 atteinte',check:s=>getWeekNum(s)>=10},
  {id:'goal',ico:'🎯',name:'Objectif !',desc:'80 kg atteints',check:s=>s.weights&&s.weights.length>0&&s.weights[0].val<=80},
];

function checkBadges(){
  const s=getState();
  if(!s.unlockedBadges)s.unlockedBadges=[];
  let newB=[];
  BADGE_DEFS.forEach(b=>{if(!s.unlockedBadges.includes(b.id)&&b.check(s)){s.unlockedBadges.push(b.id);newB.push(b);}});
  if(newB.length){saveState(s);setTimeout(()=>newB.forEach(b=>showBadgeNotif(b)),500);}
}
function showBadgeNotif(b){
  openModal('🏅 Badge débloqué !','<div style="text-align:center;padding:20px 0"><div style="font-size:64px">'+b.ico+'</div><div style="font-size:20px;font-weight:700;margin-top:12px">'+b.name+'</div><div style="color:var(--muted);margin-top:6px">'+b.desc+'</div></div>');
}
function showBadges(){
  const s=getState();if(!s.unlockedBadges)s.unlockedBadges=[];
  const html='<div class="badges-grid">'+BADGE_DEFS.map(b=>{
    const u=s.unlockedBadges.includes(b.id);
    return '<div class="badge-item '+(u?'unlocked':'locked')+'"><div class="badge-ico">'+b.ico+'</div><div class="badge-name">'+b.name+'</div><div class="badge-desc">'+b.desc+'</div></div>';
  }).join('')+'</div>';
  openModal('Mes badges 🏅 ('+s.unlockedBadges.length+'/'+BADGE_DEFS.length+')',html);
}

// ─── PROTEIN COUNTER ──────────────────────────────────────────
function getProteinEaten(){
  const s=getState();const key=todayKey();
  const dow=new Date().getDay();const sc=SCHED[dow];
  const wk=getWeekNum(s);
  const meals=getWeeklyMeals(wk,sc.type);
  const done=(s.mealsDone||{})[key]||{};
  let total=0;
  meals.forEach((m,i)=>{
    if(done[i]&&!m.t.includes('Créatine')){
      const match=m.k.match(/(\d+)g P/);
      if(match)total+=parseInt(match[1]);
    }
  });
  return total;
}

function toggleMealDone(idx){
  const s=getState();const key=todayKey();
  if(!s.mealsDone)s.mealsDone={};
  if(!s.mealsDone[key])s.mealsDone[key]={};
  s.mealsDone[key][idx]=!s.mealsDone[key][idx];
  saveState(s);renderToday();
}

// ─── HYDRATION ────────────────────────────────────────────────
function addWater(idx){
  const s=getState();const key=todayKey();
  if(!s.hydration)s.hydration={};
  const cur=s.hydration[key]||0;
  s.hydration[key]=idx<cur?idx:idx+1;
  saveState(s);renderToday();
}

// ─── TIRED MODE ───────────────────────────────────────────────
function toggleTired(){
  const s=getState();s.tiredMode=!s.tiredMode;saveState(s);renderToday();
}

// ─── TIMER ────────────────────────────────────────────────────
var timerInterval=null,timerRemaining=90,timerTotal=90,timerRunning=false;
function openTimer(secs,name){
  timerRemaining=secs;timerTotal=secs;timerRunning=false;
  document.getElementById('timer-display').textContent=fmtTime(secs);
  document.getElementById('timer-exercise').textContent=name?'Prochain : '+name:'';
  document.getElementById('t-start').textContent='▶ Démarrer';
  document.getElementById('t-start').className='t-btn-main t-btn-go';
  updateArc(1);
  document.getElementById('timer-overlay').classList.add('open');
}
function closeTimer(){clearInterval(timerInterval);timerRunning=false;document.getElementById('timer-overlay').classList.remove('open');}
function toggleTimer(){
  if(timerRunning){
    clearInterval(timerInterval);timerRunning=false;
    document.getElementById('t-start').textContent='▶ Reprendre';
    document.getElementById('t-start').className='t-btn-main t-btn-go';
  } else {
    timerRunning=true;
    document.getElementById('t-start').textContent='⏸ Pause';
    document.getElementById('t-start').className='t-btn-main t-btn-pause';
    timerInterval=setInterval(function(){
      timerRemaining--;
      document.getElementById('timer-display').textContent=fmtTime(timerRemaining);
      updateArc(timerRemaining/timerTotal);
      if(timerRemaining<=0){
        clearInterval(timerInterval);timerRunning=false;
        document.getElementById('timer-display').textContent='GO !';
        document.getElementById('t-start').textContent='▶ Relancer';
        document.getElementById('t-start').className='t-btn-main t-btn-go';
        timerRemaining=timerTotal;updateArc(1);
      }
    },1000);
  }
}
function fmtTime(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60);}
function updateArc(pct){
  var arc=document.getElementById('timer-arc');
  if(arc){var c=2*Math.PI*80;arc.style.strokeDashoffset=c*(1-pct);}
}

// ─── STRENGTH LOGGER ──────────────────────────────────────────
function openStrengthLog(exName){
  const s=getState();
  const hist=(s.strengthHistory||{})[exName]||[];
  const histHTML=hist.length?'<div style="margin-top:12px"><div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:8px">Historique</div>'+hist.map(function(h,i){
    const prev=hist[i+1];const diff=prev?(h.val-prev.val).toFixed(1):null;
    const arrow=diff?(parseFloat(diff)>0?'<span style="color:var(--green)">+'+diff+' kg ↑</span>':(parseFloat(diff)<0?'<span style="color:var(--red)">'+diff+' kg ↓</span>':'')):'';
    return '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--muted)">'+h.date+'</span><span style="font-weight:600">'+h.val+' kg '+arrow+'</span></div>';
  }).join('')+'</div>':'';
  openModal('Logger les charges 📝 — '+exName,
    '<div style="font-size:13px;color:var(--muted);margin-bottom:12px">Entre le poids utilisé (kg)</div>'+
    '<div style="display:flex;gap:8px;margin-bottom:8px">'+
    '<input type="number" id="kg-inp" placeholder="ex: 40" step="2.5" min="0" max="300" inputmode="decimal" style="flex:1;padding:12px;font-size:16px;border:1.5px solid var(--border);border-radius:12px;background:var(--card);color:var(--text);font-family:inherit">'+
    '<button onclick="saveStrength(\''+exName.replace(/'/g,"\\'")+'\')" style="padding:12px 16px;border:none;border-radius:12px;background:var(--green);color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer">Sauver</button>'+
    '</div>'+histHTML
  );
}
function saveStrength(exName){
  const inp=document.getElementById('kg-inp');const val=parseFloat(inp.value);
  if(isNaN(val)||val<0)return;
  const s=getState();
  if(!s.strengthHistory)s.strengthHistory={};
  if(!s.strengthHistory[exName])s.strengthHistory[exName]=[];
  s.strengthHistory[exName].unshift({val:val,date:new Date().toLocaleDateString('fr-FR')});
  if(s.strengthHistory[exName].length>10)s.strengthHistory[exName]=s.strengthHistory[exName].slice(0,10);
  saveState(s);closeModal();renderToday();
}

// ─── OVERRIDE renderToday to add new features ─────────────────
var _origRenderToday = renderToday;
renderToday = function(){
  _origRenderToday();
  // Inject protein bar, hydration, tired btn, meal checks, quick meals after render
  injectTodayExtras();
};

function injectTodayExtras(){
  const s=getState();const key=todayKey();
  const dow=new Date().getDay();const sc=SCHED[dow];
  const wk=getWeekNum(s);
  const isDone=!!(s.doneDays||{})[key];

  // Protein bar
  const protEaten=getProteinEaten();
  const protPct=Math.min(100,Math.round(protEaten/185*100));
  const protHTML='<div class="prot-bar-wrap">'+
    '<div class="prot-bar-top"><span class="prot-bar-title">💪 Protéines du jour</span><span class="prot-bar-val">'+protEaten+'g / 185g</span></div>'+
    '<div class="prot-bar-bg"><div class="prot-bar-fill" style="width:'+protPct+'%"></div></div>'+
    '</div>';

  // Hydration
  const todayH=(s.hydration||{})[key]||0;const wt=sc.type!=='rest'?10:8;
  const wbtns=Array.from({length:wt},function(_,i){return '<div class="water-btn'+(i<todayH?' filled':'')+'" onclick="addWater('+i+')">'+(i<todayH?'💧':'○')+'</div>';}).join('');
  const hydHTML='<div class="hydra-wrap">'+
    '<div class="hydra-top"><span class="hydra-title">💧 Hydratation</span><span class="hydra-count">'+todayH+' / '+wt+' verres</span></div>'+
    '<div class="hydra-row">'+wbtns+'</div>'+
    '</div>';

  // Inject before stitle "Séance du jour"
  const tab=document.getElementById('tab-today');
  if(!tab)return;
  const stitleNodes=tab.querySelectorAll('.stitle');
  if(stitleNodes.length>0){
    const seanceTitle=stitleNodes[0];
    const wrapper=document.createElement('div');
    wrapper.innerHTML=protHTML+hydHTML;
    tab.insertBefore(wrapper,seanceTitle);
  }

  // Add tired btn after done btn
  if(!isDone&&sc.type!=='rest'){
    const doneBtn=tab.querySelector('.done-btn');
    if(doneBtn&&!tab.querySelector('.tired-btn')){
      const tb=document.createElement('button');
      tb.className='tired-btn';
      tb.onclick=toggleTired;
      tb.textContent=s.tiredMode?'❌ Désactiver mode allégé':'😴 Je suis fatiguée · mode allégé';
      doneBtn.parentNode.insertBefore(tb,doneBtn.nextSibling);
    }
  }

  // Add meal checkboxes
  const meals=getWeeklyMeals(wk,sc.type);
  const doneMeals=(s.mealsDone||{})[key]||{};
  const mealRows=tab.querySelectorAll('.meal-row');
  mealRows.forEach(function(row,i){
    if(i>=meals.length)return;
    const m=meals[i];if(m.t.includes('Créatine'))return;
    if(row.querySelector('.meal-check'))return;
    const isDoneM=!!doneMeals[i];
    const chk=document.createElement('div');
    chk.className='meal-check'+(isDoneM?' checked':'');
    chk.textContent=isDoneM?'✓':'';
    chk.onclick=function(){toggleMealDone(i);};
    const mealT=row.querySelector('.meal-t');
    if(mealT){mealT.style.display='flex';mealT.style.justifyContent='space-between';mealT.appendChild(chk);}
    if(isDoneM)row.style.opacity='0.55';
  });

  // Quick meals
  const qm=getQuickMeals(sc.type);
  const qHTML='<div class="stitle">⚡ Repas rapides si t\'as pas le temps</div>'+
    qm.map(function(q){return '<div class="quick-meal"><strong>'+q.title+'</strong>'+q.meal+'</div>';}).join('');
  tab.insertAdjacentHTML('beforeend',qHTML);

  // Badges row
  const unl=(s.unlockedBadges||[]).length;
  const bHTML='<div style="text-align:center;padding:4px 0 8px"><span style="cursor:pointer;font-size:13px;color:var(--muted)" onclick="showBadges()">🏅 '+unl+' badge'+(unl>1?'s':'')+' débloqué'+(unl>1?'s':'')+(unl<BADGE_DEFS.length?' · '+( BADGE_DEFS.length-unl)+' à débloquer':'')+'</span></div>';
  tab.insertAdjacentHTML('beforeend',bHTML);
}

// ─── TIRED MODE IN SESSION ────────────────────────────────────
// Override buildGymHTML to add timer + log + video buttons

buildGymHTML=function(session,sessionType){
  const s=getState();const wk=getWeekNum(s);
  const warmupHTML=session.warmup.map(function(e){
    return '<div class="exercise-row"><div class="ex-num" style="background:#fef3c7;color:#92400e">🔥</div><div><div class="ex-name">'+e.n+'</div><div class="ex-detail">'+e.d+'</div><span class="ex-sets">'+e.sets+'</span></div></div>';

  const muscleHTML=session.muscle.map(function(e,i){
    const logKey=e.n+'_w'+wk;
    const logged=(s.strengthHistory||{})[e.n]&&s.strengthHistory[e.n][0]?s.strengthHistory[e.n][0].val:null;
    const footer='<div class="ex-footer">'+
      (e.rest>0?'<button class="ex-timer-btn" onclick="openTimer('+e.rest+',\''+e.n.replace(/'/g,"\\'")+'\')">⏱ '+e.rest+'s</button>':'')+
      '<button class="ex-log-btn" onclick="openStrengthLog(\''+e.n.replace(/'/g,"\\'")+'\')">📝 '+(logged?logged+'kg':'Logger')+'</button>'+
      (logged?'<span class="ex-logged">✓ '+logged+' kg</span>':'')+
      '<button class="ex-yt-btn" onclick="window.open(\'https://www.youtube.com/results?search_query='+encodeURIComponent((e.yt||e.n)+' exercice technique')+'\',\'_blank\')">▶ Vidéo</button>'+
      '</div>';
    return '<div class="exercise-row"><div class="ex-num">'+(i+1)+'</div><div><div class="ex-name">'+e.n+'</div><div class="ex-detail">'+e.d+'</div><span class="ex-sets">'+e.sets+'</span>'+footer+'</div></div>';
  }).join('');
  return '<div class="gym-section"><div class="gym-section-title">Échauffement <span class="gym-section-badge s-warmup">10 min</span></div><div style="padding:0 0 4px">'+warmupHTML+'</div></div>'+
    '<div class="gym-section"><div class="gym-section-title">Programme musculaire <span class="gym-section-badge s-muscle">~50 min</span></div><div style="padding:0 0 4px">'+muscleHTML+'</div></div>'+
    '<div class="gym-section"><div class="gym-section-title">Cardio finisher <span class="gym-section-badge s-cardio">30 min</span></div>'+
    '<div class="tapis-card"><div class="tapis-title">🏃 Tapis de marche incliné</div><div class="tapis-stats">'+
    '<div class="tapis-stat"><div class="tapis-val">'+session.finisher.incline+'%</div><div class="tapis-lbl">Inclinaison</div></div>'+
    '<div class="tapis-stat"><div class="tapis-val">'+session.finisher.speed+' km/h</div><div class="tapis-lbl">Vitesse</div></div>'+
    '<div class="tapis-stat"><div class="tapis-val">30 min</div><div class="tapis-lbl">Durée</div></div>'+
    '</div><div class="tapis-note">'+session.finisher.note+'</div></div></div>';
};

function getQuickMeals(type){
  const s=getState();const prefs=s.foodPrefs||{};const ok=function(id){return prefs[id]!==false;};
  const p=ok('poulet')?'poulet':ok('thon')?'thon':'dinde';
  const v=ok('haricots_verts')?'haricots verts':ok('pois')?'petits pois':'brocoli';
  return[
    {title:'⚡ 5 minutes',meal:'150g '+p+' froid + '+v+' surgelés micro-onde 3 min + 1 œuf dur · ~35g P'},
    {title:'⚡ Shake express',meal:'Yaourt grec 200g + 30g flocons d\'avoine + banane · mixer 30 sec · ~35g P'},
    {title:'⚡ Sans cuisson',meal:'Boîte de thon + haricots blancs + huile olive + citron · 0 cuisson · ~45g P'},
  ];
}

// ─── TAB: CORPS ───────────────────────────────────────────────
function renderCorps(){
  const s=getState();
  const meas=s.measurements||[];
  const latest=meas[0]||null;const prev=meas[1]||null;
  const fields=[{k:'waist',l:'Tour de taille',ico:'📏'},{k:'hips',l:'Tour de hanches',ico:'📐'},{k:'thigh',l:'Tour de cuisse (1 jambe)',ico:'🦵'},{k:'arm',l:'Tour de bras (1 bras)',ico:'💪'},{k:'chest',l:'Poitrine',ico:'👚'}];
  const measHTML=latest?fields.map(function(f){
    const val=latest[f.k];if(!val)return'';
    const pval=prev?prev[f.k]:null;
    const diff=pval?(val-pval).toFixed(1):null;
    const diffHTML=diff?(parseFloat(diff)<0?'<div class="meas-diff" style="color:var(--green)">'+diff+' cm ↓</div>':(parseFloat(diff)>0?'<div class="meas-diff" style="color:var(--red)">+'+diff+' cm ↑</div>':'')):'' ;
    return'<div class="meas-item"><div class="meas-label">'+f.ico+' '+f.l+'</div><div class="meas-val">'+val+' cm</div>'+diffHTML+'</div>';
  }).join(''):'<div style="font-size:13px;color:var(--muted);grid-column:span 2;padding:4px 0">Aucune mesure enregistrée</div>';

  const mainEx=['Squat barre libre','Hip thrust barre','Développé couché barre','Tractions assistées','Soulevé de terre roumain'];
  const sh=s.strengthHistory||{};
  const strengthHTML=mainEx.map(function(ex){
    const hist=sh[ex]||[];const best=hist.length?Math.max.apply(null,hist.map(function(h){return h.val;})):null;
    const last=hist[0]||null;
    return'<div class="strength-item"><div class="strength-name">'+ex+(best?'<span class="strength-best">'+best+' kg</span>':'')+'</div>'+
      '<div class="strength-hist">'+(last?'Dernière : '+last.val+' kg le '+last.date:'Pas encore loggé')+'</div>'+
      '<div class="strength-add"><input type="number" id="str-'+ex.replace(/[^a-z]/gi,'').slice(0,8)+'" placeholder="kg aujourd\'hui" step="2.5" min="0" max="300" inputmode="decimal">'+
      '<button onclick="quickLogStrength(\''+ex.replace(/'/g,"\\'")+'\',' +'\'str-'+ex.replace(/[^a-z]/gi,'').slice(0,8)+'\')">+</button></div></div>';
  }).join('');

  document.getElementById('tab-corps').innerHTML=
    '<div class="stitle">Mensurations</div>'+
    '<div class="meas-grid">'+measHTML+'</div>'+
    '<div class="stitle">Enregistrer mes mensurations</div>'+
    '<div class="card"><div class="card-body">'+
    '<div class="meas-input-grid">'+fields.map(function(f){return'<div class="meas-input-wrap"><label>'+f.ico+' '+f.l+'</label><input type="number" id="meas-'+f.k+'" placeholder="cm" step="0.5" min="20" max="200" inputmode="decimal" value="'+(latest&&latest[f.k]?latest[f.k]:'')+'"></div>';}).join('')+'</div>'+
    '<button onclick="saveMeasurements()" style="width:100%;padding:12px;border:none;border-radius:12px;background:var(--green);color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:4px">Enregistrer</button>'+
    '</div></div>'+
    '<div class="stitle">Records de force 💪</div>'+
    '<div class="card"><div class="card-body">'+strengthHTML+'</div></div>'+
    '<div class="tip-card"><strong>Coach dit :</strong> Même si la balance stagne, les cm diminuent quand tu gagnes du muscle. Mesure-toi toutes les 2 semaines !</div>';
}

function saveMeasurements(){
  const s=getState();const fields=['waist','hips','thigh','arm','chest'];
  const entry={date:new Date().toLocaleDateString('fr-FR')};let hasVal=false;
  fields.forEach(function(k){const el=document.getElementById('meas-'+k);if(el&&el.value){entry[k]=parseFloat(el.value);hasVal=true;}});
  if(!hasVal)return;
  if(!s.measurements)s.measurements=[];
  s.measurements.unshift(entry);
  if(s.measurements.length>20)s.measurements=s.measurements.slice(0,20);
  saveState(s);renderCorps();
}

function quickLogStrength(exName,inputId){
  const inp=document.getElementById(inputId);if(!inp||!inp.value)return;
  const val=parseFloat(inp.value);if(isNaN(val)||val<=0)return;
  const s=getState();
  if(!s.strengthHistory)s.strengthHistory={};
  if(!s.strengthHistory[exName])s.strengthHistory[exName]=[];
  s.strengthHistory[exName].unshift({val:val,date:new Date().toLocaleDateString('fr-FR')});
  if(s.strengthHistory[exName].length>10)s.strengthHistory[exName]=s.strengthHistory[exName].slice(0,10);
  saveState(s);inp.value='';renderCorps();
}
